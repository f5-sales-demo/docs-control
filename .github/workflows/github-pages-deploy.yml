---
name: Build and Deploy Docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/config/**'
      - 'workflows/**'
  workflow_call:
    inputs:
      content-path:
        description: 'Path to content directory in the calling repo'
        required: false
        default: 'docs'
        type: string
      builder-image:
        description: 'Builder Docker image URI'
        required: false
        default: 'ghcr.io/f5xc-salesdemos/docs-builder:latest'
        type: string
      docs-title:
        description: 'Documentation site title (overrides frontmatter)'
        required: false
        type: string
      docs-site:
        description: 'Documentation site URL'
        required: false
        default: 'https://f5xc-salesdemos.github.io'
        type: string
  workflow_dispatch:
    inputs:
      content-path:
        description: 'Path to content directory'
        required: false
        default: 'docs'
        type: string
      builder-image:
        description: 'Builder Docker image URI'
        required: false
        default: 'ghcr.io/f5xc-salesdemos/docs-builder:latest'
        type: string
      docs-title:
        description: 'Documentation site title'
        required: false
        type: string
      docs-site:
        description: 'Documentation site URL'
        required: false
        default: 'https://f5xc-salesdemos.github.io'
        type: string

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage imported files for documentation
        run: |
          CONTENT="${{ inputs.content-path || 'docs' }}"
          IMPORTS="${CONTENT}/_imports"
          DATA_DIR="${CONTENT}/_data"
          if [ -f "$IMPORTS" ]; then
            mkdir -p "$DATA_DIR"
            while IFS= read -r file; do
              [ -z "$file" ] || [ "${file:0:1}" = "#" ] && continue
              if [ -f "$file" ]; then
                cp "$file" "$DATA_DIR/"
                echo "Staged: $file"
              fi
            done < "$IMPORTS"
          fi

      - name: Detect static asset directories
        id: assets
        run: |
          CONTENT="${{ inputs.content-path || 'docs' }}"
          MOUNTS=""
          for dir in "$CONTENT"/*/; do
            [ ! -d "$dir" ] && continue
            dirname=$(basename "$dir")
            if ! find "$dir" -maxdepth 1 \( -name '*.md' -o -name '*.mdx' \) | grep -q .; then
              MOUNTS="$MOUNTS -v ${{ github.workspace }}/$dir:/app/public/$dirname:ro"
              echo "Static asset directory: $dirname"
            fi
          done
          echo "mounts=$MOUNTS" >> "$GITHUB_OUTPUT"

      - name: Build docs with container
        run: |
          mkdir -p ${{ runner.temp }}/docs-output
          chmod 777 ${{ runner.temp }}/docs-output

          docker run --rm \
            --name docs-builder \
            -v ${{ github.workspace }}/${{ inputs.content-path || 'docs' }}:/content/docs:ro \
            ${{ steps.assets.outputs.mounts }} \
            -v ${{ runner.temp }}/docs-output:/output \
            -e CONTENT_DIR=/content/docs \
            -e OUTPUT_DIR=/output \
            -e DOCS_SITE="${{ inputs.docs-site || 'https://f5xc-salesdemos.github.io' }}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            ${{ inputs.docs-title && format('-e DOCS_TITLE="{0}"', inputs.docs-title) || '' }} \
            ${{ inputs.builder-image || 'ghcr.io/f5xc-salesdemos/docs-builder:latest' }}

          echo "✅ Build completed successfully"
          ls -lah ${{ runner.temp }}/docs-output/

      - name: Verify build output
        run: |
          OUTPUT_DIR="${{ runner.temp }}/docs-output"

          if [ ! -d "$OUTPUT_DIR" ] || [ -z "$(ls -A $OUTPUT_DIR)" ]; then
            echo "❌ Build output is empty"
            exit 1
          fi

          echo "✅ Build output verified"
          echo "Files generated:"
          find "$OUTPUT_DIR" -type f | head -20

      - name: Stage governance assets for /api/
        run: |
          OUTPUT_DIR="${{ runner.temp }}/docs-output"
          API_DIR="${OUTPUT_DIR}/api"
          mkdir -p "${API_DIR}/files"

          # Static config & templates
          for src in \
              .github/config/repo-settings.json \
              .github/config/managed-files-manifest.json \
              .github/config/docs-sites.json \
              README.md.tpl; do
            [ -f "$src" ] || continue
            dest="${API_DIR}/$(basename "$src")"
            cp "$src" "$dest"
            echo "Published: /api/$(basename "$src")"
          done

          # Per-file copies of every path listed in the managed-files manifest
          MANIFEST=".github/config/managed-files-manifest.json"
          if [ -f "$MANIFEST" ]; then
            mapfile -t FILES < <(jq -r '.files | keys[]' "$MANIFEST")
            for dest in "${FILES[@]}"; do
              if [ -f "$dest" ]; then
                target="${API_DIR}/files/${dest}"
                mkdir -p "$(dirname "$target")"
                cp "$dest" "$target"
                echo "Published: /api/files/${dest}"
              fi
            done
          fi

          # Revision marker — lets downstreams detect Pages deploy lag
          jq -n \
            --arg commit "${GITHUB_SHA}" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{commit:$commit, generated_at:$generated_at}' \
            > "${API_DIR}/revision.json"
          echo "Published: /api/revision.json"

          # Nudge Pages to not apply Jekyll to the api/ directory
          touch "${OUTPUT_DIR}/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/docs-output
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
