---
name: Dispatch Downstream Enforcement

# Runs AFTER "Build Managed Files Manifest" completes, never concurrently
# with it. The manifest is the source of truth sync reads; triggering on
# the manifest build's completion (rather than the same push) guarantees
# the freshly-committed manifest is in place before downstream sync fetches
# it — eliminating the race where sync read a stale manifest and skipped
# newly-added managed files. workflow_dispatch is kept as a manual fallback.
on:
  workflow_run:
    workflows: ["Build Managed Files Manifest"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-downstream
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # Only fan out when the manifest build succeeded (or on manual dispatch).
    # Skips on manifest-build failure so downstream never syncs a bad manifest.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Dispatch enforce-repo-settings to all downstream repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN }}
        # Single-runner fan-out: one job instead of a 25-cell matrix.
        # Parallelism within the job (xargs -P 5) preserves the previous
        # max-parallel throughput without allocating 25 runners.
        run: |
          set -euo pipefail

          dispatch_one() {
            local repo="$1"
            local attempt=1
            local max=3
            local delay=2
            while true; do
              if gh workflow run enforce-repo-settings.yml \
                  --repo "$repo" >/dev/null 2>&1; then
                printf '[OK]   %s\n' "$repo"
                return 0
              fi
              if [ "$attempt" -ge "$max" ]; then
                printf '[FAIL] %s\n' "$repo"
                return 1
              fi
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          export -f dispatch_one

          mapfile -t REPOS < <(jq -r '.[]' .github/config/downstream-repos.json)
          echo "Dispatching enforce-repo-settings to ${#REPOS[@]} repos (parallelism 5)..."

          LOG=$(mktemp)
          # xargs -P returns 123 when any child exited non-zero. That's
          # expected here (we aggregate failures via LOG below), so disable
          # pipefail-driven exit for just this pipeline.
          set +e
          printf '%s\n' "${REPOS[@]}" \
            | xargs -I{} -P 5 bash -c 'dispatch_one "$@"' _ {} \
            | tee "$LOG"
          set -e

          FAIL_COUNT=$(grep -c '^\[FAIL\]' "$LOG" || true)
          if [ "${FAIL_COUNT:-0}" -gt 0 ]; then
            echo ""
            echo "::error::${FAIL_COUNT} dispatch(es) failed"
            exit 1
          fi

          echo ""
          echo "All ${#REPOS[@]} dispatches succeeded."
