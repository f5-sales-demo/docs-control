---
name: Dispatch Downstream Enforcement

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: dispatch-downstream
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dispatch to downstream repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN }}
        run: |
          # Retry with exponential backoff
          # Usage: retry <max_attempts> <command> [args...]
          retry() {
            local max="$1"; shift
            local attempt=1
            local delay=2
            while true; do
              if "$@"; then return 0; fi
              if [ "$attempt" -ge "$max" ]; then
                echo "[ERROR] Failed after ${max} attempts: $*" >&2
                return 1
              fi
              echo "[WARN] Attempt ${attempt}/${max} failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          # Stagger dispatches with 2-6s jitter to avoid 25 simultaneous
          # workflow starts hammering docs-control's content endpoints.
          repos=$(jq -r '.[]' .github/config/downstream-repos.json)
          first=true
          for repo in $repos; do
            if [ "$first" = false ]; then
              sleep $((RANDOM % 5 + 2))
            fi
            first=false
            echo "Dispatching to $repo..."
            if retry 3 gh workflow run enforce-repo-settings.yml --repo "$repo"; then
              echo "  [OK] $repo"
            else
              echo "  [FAIL] $repo (failed after retries)"
            fi
          done
