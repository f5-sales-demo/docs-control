---
name: Dispatch Downstream Enforcement

on:
  push:
    branches: [main]
    paths:
      - '.github/config/repo-settings.json'
      - '.github/config/downstream-repos.json'
      - '.github/config/docs-sites.json'
      - 'workflows/**'
      - '.github/workflows/enforce-repo-settings.yml'
      - '.github/workflows/sync-managed-files.yml'
      - '.github/workflows/github-pages-deploy.yml'
      - '.github/workflows/require-linked-issue.yml'
      - '.github/workflows/super-linter.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'CONTRIBUTING.md'
      - 'CLAUDE.md'
      - '.editorconfig'
      - '.gitignore'
      - 'LICENSE'
      - '.pre-commit-config.yaml'
      - '.yamllint.yaml'
      - '.markdownlint.json'
      - 'biome.json'
      - '.jscpd.json'
      - '.textlintrc'
      - '.editorconfig-checker.json'
      - '.checkov.yaml'
      - 'zizmor.yml'
      - '.shellcheckrc'
      - 'README.md.tpl'

permissions:
  contents: read

concurrency:
  group: dispatch-downstream
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dispatch to downstream repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN }}
        run: |
          # Retry with exponential backoff
          # Usage: retry <max_attempts> <command> [args...]
          retry() {
            local max="$1"; shift
            local attempt=1
            local delay=2
            while true; do
              if "$@"; then return 0; fi
              if [ "$attempt" -ge "$max" ]; then
                echo "[ERROR] Failed after ${max} attempts: $*" >&2
                return 1
              fi
              echo "[WARN] Attempt ${attempt}/${max} failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          repos=$(jq -r '.[]' .github/config/downstream-repos.json)
          for repo in $repos; do
            echo "Dispatching to $repo..."
            if retry 3 gh workflow run enforce-repo-settings.yml --repo "$repo"; then
              echo "  [OK] $repo"
            else
              echo "  [FAIL] $repo (failed after retries)"
            fi
          done
