---
name: Dispatch Downstream Enforcement

# Fans out downstream enforcement once the regenerated manifest has LANDED on
# main. The manifest is the source of truth sync reads; because main is
# protected, "Build Managed Files Manifest" cannot push it directly and routes
# it through an auto-merging sync/manifest PR. Triggering on that PR's merge
# (a push to main touching the manifest) — not on the build's completion —
# guarantees downstream reads the fresh manifest instead of racing the still-open
# PR and fanning out the stale one (issue #634). repo-settings.json is included
# so settings-only changes, which leave the manifest untouched, still enforce
# downstream. workflow_dispatch is kept as a manual fallback.
on:
  push:
    branches: [main]
    paths:
      - '.github/config/managed-files-manifest.json'
      - '.github/config/repo-settings.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-downstream
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # No conclusion guard needed: dispatch now fires only when the manifest has
    # already landed on main. A bad manifest fails the sync/manifest PR's checks
    # and never merges, so it can never reach main to trigger this workflow.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dispatch enforce-repo-settings to all downstream repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN }}
        run: |
          set -euo pipefail

          dispatch_one() {
            local repo="$1"
            local attempt=1
            local max=3
            local delay=2
            while true; do
              if gh workflow run enforce-repo-settings.yml \
                  --repo "$repo" >/dev/null 2>&1; then
                printf '[OK]   %s\n' "$repo"
                return 0
              fi
              if [ "$attempt" -ge "$max" ]; then
                printf '[FAIL] %s\n' "$repo"
                return 1
              fi
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          export -f dispatch_one

          mapfile -t REPO_NAMES < <(jq -r '.[]' .github/config/downstream-repos.json)
          REPOS=()
          for name in "${REPO_NAMES[@]}"; do
            REPOS+=("${GITHUB_REPOSITORY_OWNER}/${name}")
          done
          TOTAL=${#REPOS[@]}
          BATCH_SIZE=5
          BATCH_DELAY=45
          echo "Dispatching enforce-repo-settings to ${TOTAL} repos (batches of ${BATCH_SIZE}, ${BATCH_DELAY}s delay)..."

          LOG=$(mktemp)
          FAIL_COUNT=0
          batch=0

          for ((i = 0; i < TOTAL; i += BATCH_SIZE)); do
            batch=$((batch + 1))
            batch_repos=("${REPOS[@]:i:BATCH_SIZE}")
            echo ""
            echo "--- Batch ${batch} (repos $((i+1))-$((i+${#batch_repos[@]})) of ${TOTAL}) ---"

            for repo in "${batch_repos[@]}"; do
              dispatch_one "$repo" >> "$LOG" 2>&1 &
            done
            wait

            # Show batch results
            cat "$LOG"

            # Count failures so far
            BATCH_FAILS=$(grep -c '^\[FAIL\]' "$LOG" || true)
            FAIL_COUNT=$((FAIL_COUNT + BATCH_FAILS))
            : > "$LOG"

            # Delay between batches (skip after last)
            remaining=$((TOTAL - i - ${#batch_repos[@]}))
            if [ "$remaining" -gt 0 ]; then
              echo "[INFO] Waiting ${BATCH_DELAY}s before next batch..."
              sleep "$BATCH_DELAY"
            fi
          done

          if [ "${FAIL_COUNT}" -gt 0 ]; then
            echo ""
            echo "::error::${FAIL_COUNT} dispatch(es) failed"
            exit 1
          fi

          echo ""
          echo "All ${TOTAL} dispatches succeeded."
