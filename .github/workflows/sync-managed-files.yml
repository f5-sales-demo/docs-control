---
name: Sync Managed Files

on:
  workflow_call:
    secrets:
      repo-sync-token:
        description: 'PAT with contents, issues, and pull-request permissions for file sync'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v6

      - name: Sync managed files
        env:
          GH_TOKEN: ${{ secrets.repo-sync-token }}
        run: |
          set -euo pipefail

          # ─── Retry helpers ─────────────────────────────────────────────────
          # Retry with exponential backoff (for commands without stdin)
          # Usage: retry <max_attempts> <command> [args...]
          retry() {
            local max="$1"; shift
            local attempt=1
            local delay=2
            while true; do
              if "$@"; then return 0; fi
              if [ "$attempt" -ge "$max" ]; then
                echo "[ERROR] Failed after ${max} attempts: $*" >&2
                return 1
              fi
              echo "[WARN] Attempt ${attempt}/${max} failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          # Retry with JSON body (for gh api --input - calls)
          # Usage: retry_json <max_attempts> <json_string> <gh api args...>
          retry_json() {
            local max="$1"; shift
            local json="$1"; shift
            local attempt=1
            local delay=2
            while true; do
              if echo "$json" | gh api "$@" --input -; then return 0; fi
              if [ "$attempt" -ge "$max" ]; then
                echo "[ERROR] Failed after ${max} attempts: gh api $*" >&2
                return 1
              fi
              echo "[WARN] Attempt ${attempt}/${max} failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          CONFIG_REPO="f5xc-salesdemos/docs-control"
          CONFIG_PATH=".github/config/repo-settings.json"

          # ─── Helper: wait for checks and auto-merge ──────────────────────
          wait_and_merge() {
            local pr_num="$1"
            local repo_slug="$2"
            local max_wait=180   # 3 minutes total
            local poll_interval=15
            local elapsed=0

            echo "[INFO] Waiting for CI checks on PR #${pr_num} (timeout: ${max_wait}s)..."

            # Poll until checks appear or timeout
            while [ "$elapsed" -lt "$max_wait" ]; do
              sleep "$poll_interval"
              elapsed=$((elapsed + poll_interval))

              # Check if any checks have been reported
              CHECK_OUTPUT=$(gh pr checks "${pr_num}" --repo "${repo_slug}" 2>&1) || true
              if echo "$CHECK_OUTPUT" | grep -q "no checks reported"; then
                echo "[INFO] No checks reported yet (${elapsed}s elapsed)..."
                continue
              fi

              # Checks exist — watch them to completion
              echo "[INFO] Checks detected — watching for completion..."
              if gh pr checks "${pr_num}" --repo "${repo_slug}" --watch; then
                echo "[INFO] CI passed — merging PR #${pr_num}..."
                local merge_attempts=0
                while [ "$merge_attempts" -lt 3 ]; do
                  if gh pr merge "${pr_num}" --repo "${repo_slug}" --squash --delete-branch; then
                    echo "[OK] Merged sync PR #${pr_num}"
                    return 0
                  fi
                  merge_attempts=$((merge_attempts + 1))
                  local merge_delay=$((5 * (2 ** (merge_attempts - 1))))
                  echo "[WARN] Merge attempt ${merge_attempts}/3 failed — retrying in ${merge_delay}s..."
                  sleep "$merge_delay"
                done
                echo "[WARN] Failed to merge PR #${pr_num} after 3 attempts — may need manual merge"
                return 1
              else
                echo "[WARN] CI checks failed on PR #${pr_num} — skipping auto-merge"
                return 1
              fi
            done

            echo "[WARN] Timed out waiting for checks on PR #${pr_num} (${max_wait}s) — skipping auto-merge"
            return 1
          }

          # ─── Phase 1: Validate ─────────────────────────────────────────────
          echo "=== Phase 1: Validate ==="

          if ! command -v jq &>/dev/null; then
            echo "[ERROR] jq is not installed" >&2; exit 1
          fi
          if ! command -v gh &>/dev/null; then
            echo "[ERROR] gh CLI is not installed" >&2; exit 1
          fi
          if ! gh auth status &>/dev/null; then
            echo "[ERROR] gh is not authenticated" >&2; exit 1
          fi

          # Fetch central config from docs-control
          echo "[INFO] Fetching config from ${CONFIG_REPO}/${CONFIG_PATH}..."
          CONFIG_B64=$(retry 5 gh api "repos/${CONFIG_REPO}/contents/${CONFIG_PATH}" --jq '.content')
          CONFIG=$(echo "$CONFIG_B64" | base64 -d)
          if ! echo "$CONFIG" | jq empty 2>/dev/null; then
            echo "[ERROR] Failed to fetch or parse config from ${CONFIG_REPO}" >&2; exit 1
          fi
          echo "[OK] Fetched config from ${CONFIG_REPO}"

          echo "[OK] Config validated for ${OWNER}/${REPO}"

          # ─── Phase 2: Sync Managed Files ─────────────────────────────────────
          echo ""
          echo "=== Phase 2: Sync Managed Files ==="

          MANAGED_FILES=$(echo "$CONFIG" | jq -c '.managed_files // empty')
          SYNC_PR_CREATED=false
          EXISTING_PR=""
          SOURCE_REPO=""

          if [ -z "$MANAGED_FILES" ]; then
            echo "[SKIP] No managed_files in config"
          else
            SOURCE_REPO=$(echo "$MANAGED_FILES" | jq -r '.source_repo')

            # Guard: skip if running in the source repo itself
            if [ "${OWNER}/${REPO}" = "$SOURCE_REPO" ]; then
              echo "[SKIP] Running in source repo — skipping managed file sync"
            else
              DRIFT_FILES=""
              DRIFT_COUNT=0

              # Compute repo overrides once before the loop
              REPO_OVERRIDES=$(echo "$CONFIG" | jq -c ".repo_overrides[\"${REPO}\"] // {}")

              for file_obj in $(echo "$MANAGED_FILES" | jq -c '.files[]'); do
                src=$(echo "$file_obj" | jq -r '.src')
                dest=$(echo "$file_obj" | jq -r '.dest')

                # Check managed_files_exclude for this repo
                if echo "$REPO_OVERRIDES" | jq -e --arg s "$src" \
                    '.managed_files_exclude // [] | index($s) != null' >/dev/null 2>&1; then
                  echo "[SKIP] ${dest} — excluded via repo_overrides"
                  continue
                fi

                # Fetch canonical content from source path
                CANONICAL_RESPONSE=$(retry 3 gh api "repos/${SOURCE_REPO}/contents/${src}" 2>/dev/null) || true
                if [ -z "$CANONICAL_RESPONSE" ]; then
                  echo "[WARN] Could not fetch canonical: ${src}"
                  continue
                fi
                CANONICAL_CONTENT=$(echo "$CANONICAL_RESPONSE" | jq -r '.content' | tr -d '\n' | base64 -d 2>/dev/null) || true

                # Fetch downstream content at dest path (handle 404)
                DOWNSTREAM_RESPONSE=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/${dest}" 2>/dev/null) || true
                if [ -z "$DOWNSTREAM_RESPONSE" ]; then
                  echo "[DRIFT] Missing downstream: ${dest}"
                  DRIFT_FILES="${DRIFT_FILES}${dest}\n"
                  DRIFT_COUNT=$((DRIFT_COUNT + 1))
                  continue
                fi
                DOWNSTREAM_CONTENT=$(echo "$DOWNSTREAM_RESPONSE" | jq -r '.content' | tr -d '\n' | base64 -d 2>/dev/null) || true

                if [ "$CANONICAL_CONTENT" != "$DOWNSTREAM_CONTENT" ]; then
                  echo "[DRIFT] Content mismatch: ${dest}"
                  DRIFT_FILES="${DRIFT_FILES}${dest}\n"
                  DRIFT_COUNT=$((DRIFT_COUNT + 1))
                else
                  echo "[OK] ${dest}"
                fi
              done

              # ─── Dynamic dependabot.yml generation ────────────────────────
              echo ""
              echo "--- Dynamic dependabot.yml ---"
              DEPENDABOT_DRIFT=false

              # Detect ecosystems in target repo
              HAS_NPM=false; HAS_PIP=false; HAS_DOCKER=false
              if retry 3 gh api "repos/${OWNER}/${REPO}/contents/package.json" --jq '.sha' >/dev/null 2>&1; then
                HAS_NPM=true; echo "[INFO] Detected package.json → npm"
              fi
              if retry 3 gh api "repos/${OWNER}/${REPO}/contents/Dockerfile" --jq '.sha' >/dev/null 2>&1; then
                HAS_DOCKER=true; echo "[INFO] Detected Dockerfile → docker"
              fi
              for pyfile in requirements.txt pyproject.toml setup.py; do
                if retry 3 gh api "repos/${OWNER}/${REPO}/contents/${pyfile}" --jq '.sha' >/dev/null 2>&1; then
                  HAS_PIP=true; echo "[INFO] Detected ${pyfile} → pip"; break
                fi
              done

              # Build dependabot.yml content
              DEPBOT="---\nversion: 2\nupdates:\n  # --- GitHub Actions ---\n  - package-ecosystem: \"github-actions\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n    commit-message:\n      prefix: \"chore(deps):\"\n    labels:\n      - \"dependencies\"\n    open-pull-requests-limit: 10\n    groups:\n      actions-minor-patch:\n        update-types:\n          - \"minor\"\n          - \"patch\""

              if [ "$HAS_NPM" = true ]; then
                DEPBOT="${DEPBOT}\n\n  # --- npm ---\n  - package-ecosystem: \"npm\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n    commit-message:\n      prefix: \"chore(deps):\"\n    labels:\n      - \"dependencies\"\n    open-pull-requests-limit: 10\n    groups:\n      npm-minor-patch:\n        update-types:\n          - \"minor\"\n          - \"patch\""
              fi

              if [ "$HAS_PIP" = true ]; then
                DEPBOT="${DEPBOT}\n\n  # --- pip ---\n  - package-ecosystem: \"pip\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n    commit-message:\n      prefix: \"chore(deps):\"\n    labels:\n      - \"dependencies\"\n    open-pull-requests-limit: 10\n    groups:\n      pip-minor-patch:\n        update-types:\n          - \"minor\"\n          - \"patch\""
              fi

              if [ "$HAS_DOCKER" = true ]; then
                DEPBOT="${DEPBOT}\n\n  # --- Docker ---\n  - package-ecosystem: \"docker\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n    commit-message:\n      prefix: \"chore(deps):\"\n    labels:\n      - \"dependencies\"\n    open-pull-requests-limit: 5\n    groups:\n      docker-minor-patch:\n        update-types:\n          - \"minor\"\n          - \"patch\""
              fi

              DEPBOT="${DEPBOT}\n"
              # Write generated dependabot.yml to temp file (preserves trailing newline)
              printf '%b' "$DEPBOT" > /tmp/generated_dependabot.yml
              GENERATED_DEPENDABOT=$(cat /tmp/generated_dependabot.yml)

              # Compare with current dependabot.yml in target repo (file-based to preserve trailing newlines)
              CURRENT_DEPBOT_RESPONSE=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml" 2>/dev/null) || true
              if [ -n "$CURRENT_DEPBOT_RESPONSE" ]; then
                echo "$CURRENT_DEPBOT_RESPONSE" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/current_dependabot.yml 2>/dev/null || true
              else
                : > /tmp/current_dependabot.yml
              fi

              if ! diff -q /tmp/generated_dependabot.yml /tmp/current_dependabot.yml >/dev/null 2>&1; then
                echo "[DRIFT] .github/dependabot.yml needs update"
                DEPENDABOT_DRIFT=true
                DRIFT_FILES="${DRIFT_FILES}.github/dependabot.yml\n"
                DRIFT_COUNT=$((DRIFT_COUNT + 1))
              else
                echo "[OK] .github/dependabot.yml"
              fi

              # ─── Dynamic README.md generation ──────────────────────────────
              echo ""
              echo "--- Dynamic README.md ---"
              README_DRIFT=false

              # Fetch docs-sites.json from docs-control
              DOCS_SITES_B64=$(retry 3 gh api "repos/${CONFIG_REPO}/contents/.github/config/docs-sites.json" --jq '.content')
              DOCS_SITES_JSON=$(echo "$DOCS_SITES_B64" | base64 -d)

              # Look up label and description by matching repo name in URL
              README_TITLE=$(echo "$DOCS_SITES_JSON" | jq -r --arg r "$REPO" \
                '.[] | select(.url | contains("/" + $r + "/")) | .label' 2>/dev/null) || true
              README_DESC=$(echo "$DOCS_SITES_JSON" | jq -r --arg r "$REPO" \
                '.[] | select(.url | contains("/" + $r + "/")) | .description' 2>/dev/null) || true

              # Fallback: capitalize repo name for title
              if [ -z "$README_TITLE" ] || [ "$README_TITLE" = "null" ]; then
                README_TITLE=$(echo "$REPO" | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
                echo "[INFO] No docs-sites.json match — using capitalized repo name: ${README_TITLE}"
              fi

              # Fallback: GitHub API repo description
              if [ -z "$README_DESC" ] || [ "$README_DESC" = "null" ]; then
                README_DESC=$(gh api "repos/${OWNER}/${REPO}" --jq '.description // ""') || true
                if [ -z "$README_DESC" ] || [ "$README_DESC" = "null" ]; then
                  README_DESC=""
                fi
                echo "[INFO] No docs-sites.json description — using GitHub API description"
              fi

              DOCS_URL="https://f5xc-salesdemos.github.io/${REPO}/"

              # Fetch README.md.tpl from docs-control
              README_TPL_B64=$(retry 3 gh api "repos/${CONFIG_REPO}/contents/README.md.tpl" --jq '.content')
              README_TPL=$(echo "$README_TPL_B64" | base64 -d)

              # Substitute placeholders
              # Write generated README.md to temp file (preserves trailing newline)
              echo "$README_TPL" | \
                sed "s|__TITLE__|${README_TITLE}|g" | \
                sed "s|__DESCRIPTION__|${README_DESC}|g" | \
                sed "s|__REPO_NAME__|${REPO}|g" | \
                sed "s|__DOCS_URL__|${DOCS_URL}|g" > /tmp/generated_readme.md
              GENERATED_README=$(cat /tmp/generated_readme.md)

              # Compare with current README.md in target repo (file-based to preserve trailing newlines)
              CURRENT_README_RESPONSE=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/README.md" 2>/dev/null) || true
              if [ -n "$CURRENT_README_RESPONSE" ]; then
                echo "$CURRENT_README_RESPONSE" | jq -r '.content' | tr -d '\n' | base64 -d > /tmp/current_readme.md 2>/dev/null || true
              else
                : > /tmp/current_readme.md
              fi

              if ! diff -q /tmp/generated_readme.md /tmp/current_readme.md >/dev/null 2>&1; then
                echo "[DRIFT] README.md needs update"
                README_DRIFT=true
                DRIFT_FILES="${DRIFT_FILES}README.md\n"
                DRIFT_COUNT=$((DRIFT_COUNT + 1))
              else
                echo "[OK] README.md"
              fi

              if [ "$DRIFT_COUNT" -eq 0 ]; then
                echo "[OK] All managed files match canonical"
              else
                echo "[INFO] Found ${DRIFT_COUNT} drifted file(s)"

                # Check for existing open sync PR (idempotency)
                EXISTING_PR=$(gh pr list --repo "${OWNER}/${REPO}" \
                  --head "governance/sync-managed-files" \
                  --state open --json number --jq '.[0].number // empty' 2>/dev/null) || true
                if [ -n "$EXISTING_PR" ]; then
                  echo "[INFO] Open sync PR #${EXISTING_PR} already exists — updating drifted files"

                  # Force-update the PR branch to main's HEAD so it stays rebased
                  MAIN_SHA=$(retry 3 gh api "repos/${OWNER}/${REPO}/git/ref/heads/main" --jq '.object.sha')
                  BRANCH_UPDATE_JSON=$(jq -n --arg sha "$MAIN_SHA" '{"sha":$sha,"force":true}')
                  retry_json 3 "$BRANCH_UPDATE_JSON" \
                    "repos/${OWNER}/${REPO}/git/refs/heads/governance/sync-managed-files" --method PATCH >/dev/null
                  echo "[OK] Rebased PR branch onto main HEAD"

                  # Commit each drifted managed file to the existing PR branch
                  for dest_file in $(printf '%b' "$DRIFT_FILES" | sed '/^$/d'); do
                    if [ "$dest_file" = ".github/dependabot.yml" ] || [ "$dest_file" = "README.md" ]; then
                      continue
                    fi
                    src_file=$(echo "$MANAGED_FILES" | jq -r --arg d "$dest_file" '.files[] | select(.dest == $d) | .src')
                    B64=$(retry 3 gh api "repos/${SOURCE_REPO}/contents/${src_file}" --jq '.content' | tr -d '\n')
                    FILE_SHA=$(gh api "repos/${OWNER}/${REPO}/contents/${dest_file}?ref=governance/sync-managed-files" --jq '.sha' 2>/dev/null) || true
                    if [ -n "$FILE_SHA" ]; then
                      COMMIT_JSON=$(jq -n --arg msg "chore: sync ${dest_file}" \
                            --arg content "$B64" --arg sha "$FILE_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                    else
                      COMMIT_JSON=$(jq -n --arg msg "chore: sync ${dest_file}" \
                            --arg content "$B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                    fi
                    retry_json 3 "$COMMIT_JSON" "repos/${OWNER}/${REPO}/contents/${dest_file}" --method PUT >/dev/null
                    echo "[OK] Updated ${dest_file} on PR branch"
                  done

                  # Commit dynamic dependabot.yml if drifted
                  if [ "$DEPENDABOT_DRIFT" = true ]; then
                    DEPBOT_B64=$(printf '%s\n' "$GENERATED_DEPENDABOT" | base64 -w 0)
                    DEPBOT_SHA=$(gh api "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml?ref=governance/sync-managed-files" --jq '.sha' 2>/dev/null) || true
                    if [ -n "$DEPBOT_SHA" ]; then
                      DEPBOT_COMMIT=$(jq -n --arg msg "chore: update .github/dependabot.yml" \
                            --arg content "$DEPBOT_B64" --arg sha "$DEPBOT_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                    else
                      DEPBOT_COMMIT=$(jq -n --arg msg "chore: create .github/dependabot.yml" \
                            --arg content "$DEPBOT_B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                    fi
                    retry_json 3 "$DEPBOT_COMMIT" "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml" --method PUT >/dev/null
                    echo "[OK] Updated .github/dependabot.yml on PR branch"
                  fi

                  # Commit dynamic README.md if drifted
                  if [ "$README_DRIFT" = true ]; then
                    README_B64=$(printf '%s\n' "$GENERATED_README" | base64 -w 0)
                    README_SHA=$(gh api "repos/${OWNER}/${REPO}/contents/README.md?ref=governance/sync-managed-files" --jq '.sha' 2>/dev/null) || true
                    if [ -n "$README_SHA" ]; then
                      README_COMMIT=$(jq -n --arg msg "chore: update README.md" \
                            --arg content "$README_B64" --arg sha "$README_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                    else
                      README_COMMIT=$(jq -n --arg msg "chore: create README.md" \
                            --arg content "$README_B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                    fi
                    retry_json 3 "$README_COMMIT" "repos/${OWNER}/${REPO}/contents/README.md" --method PUT >/dev/null
                    echo "[OK] Updated README.md on PR branch"
                  fi

                  echo "[INFO] PR branch updated — attempting merge"
                  wait_and_merge "${EXISTING_PR}" "${OWNER}/${REPO}" || true
                else
                  # Close any orphaned sync issues from previous runs
                  STALE_ISSUES=$(gh issue list --repo "${OWNER}/${REPO}" \
                    --state open \
                    --search "chore: sync managed files from governance template" \
                    --json number --jq '.[].number' 2>/dev/null) || true
                  for stale_num in $STALE_ISSUES; do
                    gh issue close "$stale_num" --repo "${OWNER}/${REPO}" \
                      --comment "Superseded by new sync run. Closing stale issue." 2>/dev/null || true
                    echo "[INFO] Closed stale sync issue #${stale_num}"
                  done

                  # Create issue
                  DRIFT_LIST=$(printf '%b' "$DRIFT_FILES" | sed '/^$/d' | sed 's/^/- /')
                  ISSUE_BODY=$(printf 'The following managed files have drifted from the canonical source in `%s`:\n\n%s\n\nThis issue was created automatically by the governance enforcement workflow.' \
                    "$SOURCE_REPO" "$DRIFT_LIST")
                  ISSUE_NUM=$(gh issue create --repo "${OWNER}/${REPO}" \
                    --title "chore: sync managed files from governance template" \
                    --body "$ISSUE_BODY" | grep -o '[0-9]*$')
                  echo "[OK] Created issue #${ISSUE_NUM}"

                  # Create branch from main HEAD (try create, fall back to update if concurrent run created it)
                  MAIN_SHA=$(retry 3 gh api "repos/${OWNER}/${REPO}/git/ref/heads/main" --jq '.object.sha')
                  BRANCH_CREATE_JSON=$(jq -n --arg sha "$MAIN_SHA" '{"ref":"refs/heads/governance/sync-managed-files","sha":$sha}')
                  if ! retry_json 3 "$BRANCH_CREATE_JSON" "repos/${OWNER}/${REPO}/git/refs" --method POST >/dev/null 2>&1; then
                    BRANCH_UPDATE_JSON=$(jq -n --arg sha "$MAIN_SHA" '{"sha":$sha,"force":true}')
                    retry_json 3 "$BRANCH_UPDATE_JSON" "repos/${OWNER}/${REPO}/git/refs/heads/governance/sync-managed-files" --method PATCH >/dev/null
                  fi
                  echo "[OK] Created or updated branch governance/sync-managed-files"

                  # Commit each drifted file to the branch
                  for dest_file in $(printf '%b' "$DRIFT_FILES" | sed '/^$/d'); do
                    # Skip dynamically generated files — committed separately below
                    if [ "$dest_file" = ".github/dependabot.yml" ] || [ "$dest_file" = "README.md" ]; then
                      continue
                    fi

                    # Look up the source path from the manifest
                    src_file=$(echo "$MANAGED_FILES" | jq -r --arg d "$dest_file" '.files[] | select(.dest == $d) | .src')

                    # Get canonical content as base64
                    B64=$(retry 3 gh api "repos/${SOURCE_REPO}/contents/${src_file}" --jq '.content' | tr -d '\n')

                    # Check if file exists downstream (need SHA for update)
                    FILE_SHA=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/${dest_file}" --jq '.sha' 2>/dev/null) || true

                    if [ -n "$FILE_SHA" ]; then
                      # Update existing file
                      COMMIT_JSON=$(jq -n --arg msg "chore: sync ${dest_file}" \
                            --arg content "$B64" \
                            --arg sha "$FILE_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                      retry_json 3 "$COMMIT_JSON" "repos/${OWNER}/${REPO}/contents/${dest_file}" --method PUT >/dev/null
                    else
                      # Create new file
                      COMMIT_JSON=$(jq -n --arg msg "chore: sync ${dest_file}" \
                            --arg content "$B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                      retry_json 3 "$COMMIT_JSON" "repos/${OWNER}/${REPO}/contents/${dest_file}" --method PUT >/dev/null
                    fi
                    echo "[OK] Synced ${dest_file}"
                  done

                  # Commit dynamic dependabot.yml if drifted
                  if [ "$DEPENDABOT_DRIFT" = true ]; then
                    DEPBOT_B64=$(printf '%s\n' "$GENERATED_DEPENDABOT" | base64 -w 0)
                    DEPBOT_SHA=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml" --jq '.sha' 2>/dev/null) || true

                    if [ -n "$DEPBOT_SHA" ]; then
                      DEPBOT_COMMIT=$(jq -n --arg msg "chore: update .github/dependabot.yml" \
                            --arg content "$DEPBOT_B64" \
                            --arg sha "$DEPBOT_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                      retry_json 3 "$DEPBOT_COMMIT" "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml" --method PUT >/dev/null
                    else
                      DEPBOT_COMMIT=$(jq -n --arg msg "chore: create .github/dependabot.yml" \
                            --arg content "$DEPBOT_B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                      retry_json 3 "$DEPBOT_COMMIT" "repos/${OWNER}/${REPO}/contents/.github/dependabot.yml" --method PUT >/dev/null
                    fi
                    echo "[OK] Synced .github/dependabot.yml (dynamic)"
                  fi

                  # Commit dynamic README.md if drifted
                  if [ "$README_DRIFT" = true ]; then
                    README_B64=$(printf '%s\n' "$GENERATED_README" | base64 -w 0)
                    README_SHA=$(retry 3 gh api "repos/${OWNER}/${REPO}/contents/README.md" --jq '.sha' 2>/dev/null) || true

                    if [ -n "$README_SHA" ]; then
                      README_COMMIT=$(jq -n --arg msg "chore: update README.md" \
                            --arg content "$README_B64" \
                            --arg sha "$README_SHA" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"sha":$sha,"branch":$branch}')
                      retry_json 3 "$README_COMMIT" "repos/${OWNER}/${REPO}/contents/README.md" --method PUT >/dev/null
                    else
                      README_COMMIT=$(jq -n --arg msg "chore: create README.md" \
                            --arg content "$README_B64" \
                            --arg branch "governance/sync-managed-files" \
                        '{"message":$msg,"content":$content,"branch":$branch}')
                      retry_json 3 "$README_COMMIT" "repos/${OWNER}/${REPO}/contents/README.md" --method PUT >/dev/null
                    fi
                    echo "[OK] Synced README.md (dynamic)"
                  fi

                  # Create PR
                  PR_BODY=$(printf 'Closes #%s\n\nSynced managed files from `%s` canonical source:\n\n%s' \
                    "$ISSUE_NUM" "$SOURCE_REPO" "$DRIFT_LIST")
                  PR_URL=$(gh pr create --repo "${OWNER}/${REPO}" \
                    --head governance/sync-managed-files \
                    --title "chore: sync managed files from governance template" \
                    --body "$PR_BODY")
                  PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
                  echo "[OK] Created sync PR #${PR_NUM}"

                  # ─── Auto-merge governance PR ───────────────────────────
                  wait_and_merge "${PR_NUM}" "${OWNER}/${REPO}" || true

                  SYNC_PR_CREATED=true
                fi
              fi
            fi
          fi

          # ─── Phase 3: Verify ──────────────────────────────────────────────────
          echo ""
          echo "=== Phase 3: Verify ==="

          if [ -n "$MANAGED_FILES" ] && [ "${OWNER}/${REPO}" != "$SOURCE_REPO" ]; then
            if [ "$SYNC_PR_CREATED" = true ]; then
              echo "[OK] Sync PR created and merge attempted — check logs above for result"
            elif [ -n "$EXISTING_PR" ]; then
              echo "[OK] Existing sync PR #${EXISTING_PR} merge attempted — check logs above for result"
            else
              echo "[OK] Managed files verified"
            fi
          else
            echo "[SKIP] No managed files to verify"
          fi

          echo "[OK] Managed file sync complete"
