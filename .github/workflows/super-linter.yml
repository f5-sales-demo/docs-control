---
name: Super-Linter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read
  packages: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Biome runs OUTSIDE the Super-Linter container so we can track Biome
      # `latest` instead of being gated on Super-Linter's container release
      # cadence. Authority boundary: setup-biome owns JS/TS/JSON/JSX; the
      # Super-Linter step below runs everything else with VALIDATE_BIOME_*
      # disabled. Step order matters: if Biome fails, Super-Linter is skipped
      # (default fail-fast, no `if: always()`) so developers get a focused log.
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51  # v2.7.1 — Dependabot-managed
        with:
          version: latest

      - name: Run Biome
        run: |
          if find . -type f \( -name '*.js' -o -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' -o -name '*.json' -o -name '*.jsonc' -o -name '*.css' -o -name '*.vue' \) -not -path './node_modules/*' -not -path './.terraform/*' -not -path './dist/*' -not -path './build/*' -not -path './vendor/*' | grep -q .; then
            biome ci .
          else
            echo "No biome-eligible files found — skipping"
          fi

      - name: Run Super-Linter
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: main
          # Redirect Python tool caches out of $GITHUB_WORKSPACE so
          # TRIVY's filesystem walker never sees them. TRIVY 0.69.3
          # lstat()s entries BEFORE consulting skip-dirs, so dangling
          # .mypy_cache/missing_stubs symlinks crash the scan
          # regardless of trivy.yaml config. See #379 (follow-up to #378).
          MYPY_CACHE_DIR: /tmp/mypy_cache
          RUFF_CACHE_DIR: /tmp/ruff_cache
          PYTEST_ADDOPTS: --cache-dir=/tmp/pytest_cache
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable Biome in Super-Linter — handled by the biomejs/setup-biome
          # step above, which runs Biome `latest` instead of the container's
          # bundled version. Authority boundary: setup-biome owns JS/TS/JSON/JSX;
          # Super-Linter retains everything else.
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          LINTER_RULES_PATH: "."
          # tree-sitter-<grammar>/src/{parser,scanner}.c are either machine-
          # generated (parser.c from `tree-sitter generate`) or hand-written
          # to upstream tree-sitter conventions that do not match
          # clang-format's default style; excluding preserves fork fidelity.
          FILTER_REGEX_EXCLUDE: "(dist/|build/|release/|vendor/|tree-sitter-[^/]+/src/(parser|scanner)\\.(c|h)$|docs/(fr|es|de|ja|pt-br|ko|zh-cn|zh-tw|ar|it|hi|th)/|src/i18n/.*translations)"
          # Disable Prettier — Biome handles formatting for
          # JS/TS/JSON/CSS/HTML/GraphQL/JSX/Vue; yamllint handles
          # YAML; markdownlint handles Markdown.
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_GRAPHQL_PRETTIER: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_JSONC_PRETTIER: false
          VALIDATE_JSX_PRETTIER: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_VUE_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          # Disable ESLint — Biome handles linting for
          # JS/TS/JSON/JSX/Vue; super-linter cannot run
          # type-aware ESLint (no npm ci / tsconfig).
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JSON: false
          VALIDATE_JSONC: false
          VALIDATE_JSX: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TSX: false
          VALIDATE_VUE: false
          # Disable Stylelint — Biome handles CSS linting
          VALIDATE_CSS: false
          # Disable pre-commit — cannot execute inside super-linter container
          VALIDATE_PRE_COMMIT: false
          # Pass SC2016 exclusion to shellcheck via env so actionlint's
          # embedded shellcheck also skips it (.shellcheckrc only works
          # for the direct BASH linter, not actionlint's subprocess)
          SHELLCHECK_OPTS: "-e SC2016"
          # Explicit config file name — super-linter v8 defaults to
          # .yamllint.yml but our managed config uses .yamllint.yaml
          YAML_YAMLLINT_CONFIG_FILE: .yamllint.yaml
          # Without an explicit config file, Super-Linter's JSCPD uses its
          # bundled default and IGNORES the repo .jscpd.json (so the ignore /
          # threshold never apply). Point it at the managed repo config.
          # Filename only — a full path triggers the doubled-slash
          # "rules file doesn't exist" bug (super-linter #6734).
          JSCPD_CONFIG_FILE: .jscpd.json
          # Point Trivy at our governance config (skip-dirs for
          # .mypy_cache, .ruff_cache, .pytest_cache so the fs walker
          # doesn't hit dangling symlinks mid-run). See issue #377.
          TRIVY_CONFIG_FILE: trivy.yaml
          SAVE_SUPER_LINTER_SUMMARY: false
          VALIDATE_ALL_CODEBASE: false
          # No commitlint config exists in managed repos
          VALIDATE_GIT_COMMITLINT: false
          # ── Python linters ─────────────────────────────────
          # Ruff: comprehensive lint + format (extends pyproject.toml).
          # Pylint: complexity/design checks. Mypy: type checking.
          # Black, Flake8, isort disabled (Ruff is a superset).
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          PYTHON_RUFF_CONFIG_FILE: .ruff.toml
          PYTHON_RUFF_FORMAT_CONFIG_FILE: .ruff.toml
          PYTHON_PYLINT_CONFIG_FILE: .python-lint
          PYTHON_MYPY_CONFIG_FILE: .mypy.ini
          # ── OpenAPI / Spectral ──────────────────────────────
          # Disabled — super-linter's Docker container can't resolve
          # repo-specific .spectral.yaml paths. Handled by the
          # dedicated Spectral step below (runs natively on runner).
          VALIDATE_OPENAPI: false
          # ── Validators irrelevant to this ecosystem's language mix ──
          # PowerShell: no .ps1 files in any governed repo.
          VALIDATE_POWERSHELL: false
          # Standalone HTML: repos are Astro/Starlight-based; generated
          # HTML is a build artifact, not source.
          VALIDATE_HTML: false
          # CPP (cpplint): overlaps with CLANG_FORMAT; clang-format is
          # the ecosystem's chosen C/C++ style enforcer and has been
          # tuned per-repo (e.g., .clang-format-ignore in xcsh).
          VALIDATE_CPP: false
          VALIDATE_CPP_EPA: false
          # Rust 2015 edition checks: governed repos target edition 2021
          # or 2024; the 2015 validator flags normal modern-edition code.
          VALIDATE_RUST_2015: false
          # Dockerfile hadolint: overlaps with CHECKOV for dockerfile
          # security scanning; running both is redundant noise.
          VALIDATE_DOCKERFILE_HADOLINT: false
          # BASH_EXEC (shebang + exec bit): repos carry node-style
          # shebangs on .ts entrypoints and intentionally lack +x
          # (invoked via `bun run ...`); this validator flags non-issues.
          VALIDATE_BASH_EXEC: false
          # EDITORCONFIG (super-linter's built-in validator): we already
          # run editorconfig-checker per-repo via the managed config.
          # The super-linter built-in duplicates that check with stricter
          # default behaviour that flags legitimate fork indentation.
          VALIDATE_EDITORCONFIG: false
          # PROTOBUF: governed repos may carry third-party proto files
          # (e.g., xcsh's Cursor protobuf imports under packages/ai/src/
          # providers/cursor/proto/) whose layout is fork-faithful.
          VALIDATE_PROTOBUF: false
          # GO: super-linter runs golangci-lint per-file, but Go's type
          # checker requires all files in a package. Repos with Go code
          # run golangci-lint correctly in their own CI jobs.
          VALIDATE_GO: false
          VALIDATE_GO_MODULES: false
          VALIDATE_GO_REVIVE: false

      - name: Spectral OpenAPI lint
        if: hashFiles('.spectral.yaml', '.spectral.yml') != ''
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
        with:
          file_glob: "**/*.json **/*.yaml"

  shell-unit-tests:
    name: Shell Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # These tests guard docs-control's own fleet-sync machinery. They
      # live only in docs-control; consumer repos that pin this workflow
      # via `workflow_call` do not carry the scripts. Each step has its
      # OWN hashFiles guard so partial file presence (e.g. a consumer
      # that inherited one script via an older governance sync) doesn't
      # admit the step and fail on the missing sibling. A multi-file
      # hashFiles('a','b','c') is OR, not AND — hence per-step guards.
      - name: Run fetch-governed test
        if: hashFiles('tests/test-fetch-governed.sh') != ''
        run: bash tests/test-fetch-governed.sh

      - name: Run inlined-helpers-match test
        if: hashFiles('tests/test-inlined-helpers-match.sh') != ''
        run: bash tests/test-inlined-helpers-match.sh

      - name: Run dispatch-matrix test
        if: hashFiles('tests/test-dispatch-matrix.sh') != ''
        run: bash tests/test-dispatch-matrix.sh

      - name: Run review-slot semaphore test
        if: hashFiles('tests/test-review-slot.sh') != ''
        run: bash tests/test-review-slot.sh
