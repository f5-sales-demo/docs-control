---
name: Super-Linter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read
  packages: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: "."
          FILTER_REGEX_EXCLUDE: "(dist/|build/|release/|vendor/)"
          # Disable Prettier — Biome handles formatting for
          # JS/TS/JSON/CSS/HTML/GraphQL/JSX/Vue; yamllint handles
          # YAML; markdownlint handles Markdown.
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_GRAPHQL_PRETTIER: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_JSONC_PRETTIER: false
          VALIDATE_JSX_PRETTIER: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_VUE_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          # Disable ESLint — Biome handles linting for
          # JS/TS/JSON/JSX/Vue; super-linter cannot run
          # type-aware ESLint (no npm ci / tsconfig).
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JSON: false
          VALIDATE_JSONC: false
          VALIDATE_JSX: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TSX: false
          VALIDATE_VUE: false
          # Disable Stylelint — Biome handles CSS linting
          VALIDATE_CSS: false
          # Disable pre-commit — cannot execute inside super-linter container
          VALIDATE_PRE_COMMIT: false
          # Pass SC2016 exclusion to shellcheck via env so actionlint's
          # embedded shellcheck also skips it (.shellcheckrc only works
          # for the direct BASH linter, not actionlint's subprocess)
          SHELLCHECK_OPTS: "-e SC2016"
          # Explicit config file name — super-linter v8 defaults to
          # .yamllint.yml but our managed config uses .yamllint.yaml
          YAML_YAMLLINT_CONFIG_FILE: .yamllint.yaml
          SAVE_SUPER_LINTER_SUMMARY: true
          # No commitlint config exists in managed repos
          VALIDATE_GIT_COMMITLINT: false
          # ── Python linters ─────────────────────────────────
          # Ruff: comprehensive lint + format (extends pyproject.toml).
          # Pylint: complexity/design checks. Mypy: type checking.
          # Black, Flake8, isort disabled (Ruff is a superset).
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          PYTHON_RUFF_CONFIG_FILE: ruff.toml
          PYTHON_RUFF_FORMAT_CONFIG_FILE: ruff.toml
          PYTHON_PYLINT_CONFIG_FILE: .python-lint
          PYTHON_MYPY_CONFIG_FILE: .mypy.ini
