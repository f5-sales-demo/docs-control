---
name: Super-Linter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read
  packages: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: "."
          # Disable prettier formatters — biome handles formatting, yamllint
          # handles YAML, markdownlint handles MD, eslint-plugin-jsonc handles JSON
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          # Disable ESLint validators — super-linter cannot run type-aware
          # ESLint rules (no npm ci, no tsconfig resolution). Repos with
          # TypeScript run ESLint in their own CI with proper dependencies.
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TSX: false
          # Disable pre-commit — cannot execute inside super-linter container
          VALIDATE_PRE_COMMIT: false
          # Pass SC2016 exclusion to shellcheck via env so actionlint's
          # embedded shellcheck also skips it (.shellcheckrc only works
          # for the direct BASH linter, not actionlint's subprocess)
          SHELLCHECK_OPTS: "-e SC2016"
          # Explicit config file name — super-linter v8 defaults to
          # .yamllint.yml but our managed config uses .yamllint.yaml
          YAML_YAMLLINT_CONFIG_FILE: .yamllint.yaml
