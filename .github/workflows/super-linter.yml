---
name: Super-Linter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read
  packages: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: "."
          # Disable prettier formatters that conflict with dedicated linters
          # (yamllint handles YAML, markdownlint handles MD, eslint-plugin-jsonc handles JSON)
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          # Pass SC2016 exclusion to shellcheck via env so actionlint's
          # embedded shellcheck also skips it (.shellcheckrc only works
          # for the direct BASH linter, not actionlint's subprocess)
          SHELLCHECK_OPTS: "-e SC2016"
          # editorconfig-checker: skip indent-size (already enforced by
          # biome for JSON, yamllint for YAML, markdownlint for MD)
          EDITORCONFIG_COMMAND_ARGS: "-disable-indent-size"
          # zizmor: explicitly pass config since super-linter doesn't
          # auto-detect .zizmor.yml from LINTER_RULES_PATH
          GITHUB_ACTIONS_ZIZMOR_COMMAND_ARGS: "--config .zizmor.yml"
